<!doctype html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgify · 主屏（视觉参考 Claude Code）</title>
<link rel="stylesheet" href="../shared/tokens.css">
<style>
/* ============================================================
   桌面端外壳 —— 视觉参考 Claude Code。海与岛同色、靠海岸线（描边）分；
   圆角浮窗 + 侧栏/右卡浮岛。颜色与字体用我们自己的（干净白/近黑 + 系统字，非米白/衬线）。
   ============================================================ */
:root {
  /* 海与岛同色（白），分割只靠海岸线(描边)+圆角+微阴影——非靠颜色 */
  --cc-desk:   #d4d5d9;   /* 桌面底（窗外，衬出浮窗） */
  --cc-win:    #ffffff;   /* 海（中间对话）= 白 */
  --cc-side:   #ffffff;   /* 岛 = 同样的白 */
  --cc-bubble: #f0f0f2;   /* 用户气泡 = 浅灰药丸（不走海岸线，按 Claude/图1） */
  --cc-input:  #ffffff;
  --cc-hover:  #f1f1f3;   /* 岛内 item hover/选中（浅灰填充） */
  --cc-active: #e9e9ec;
}
[data-theme="dark"] {
  /* 暗色：海与岛同深，靠海岸线分 */
  --cc-desk:   #000000;
  --cc-win:    #1c1c1e;
  --cc-side:   #1c1c1e;
  --cc-bubble: #2c2c2f;
  --cc-input:  #1c1c1e;
  --cc-hover:  #2a2a2d;
  --cc-active: #323236;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font); font-size: 13px; color: var(--ink);
  background: var(--cc-desk); -webkit-font-smoothing: antialiased;
  padding: 16px;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
code, .mono { font-family: var(--mono); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 99px; border: 3px solid transparent; background-clip: content-box; }

.win { height: 100%; display: flex; flex-direction: column; background: var(--cc-win);
  border-radius: 14px; box-shadow: 0 16px 50px rgba(0,0,0,.20); overflow: hidden; }

/* ---- 标题栏（红绿灯 + 侧栏顶图标 | 面包屑 + 面板切换） ---- */
/* 左岛顶：红绿灯 + 收起/搜索（都在岛内） */
.side-top { display: flex; align-items: center; gap: 4px; height: 32px; margin-bottom: 6px; }
.lights { display: flex; gap: 8px; padding-left: 2px; }
.light { width: 12px; height: 12px; border-radius: 50%; }
.light.r { background: #ff5f57; } .light.y { background: #febc2e; } .light.g { background: #28c840; }
/* 主区(海)顶：面包屑 + 主题/面板切换 */
.main-head { display: flex; align-items: center; gap: 8px; height: 44px; flex: none; padding: 0 12px 0 16px; }
.crumb { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; }
.crumb .ico { color: var(--ink-3); display: grid; place-items: center; }
.crumb .sep { color: var(--ink-3); font-weight: 400; }
.crumb .muted { color: var(--ink-2); font-weight: 400; }
.crumb .chev { color: var(--ink-3); }
.grow { flex: 1; }
.ibtn { width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center; color: var(--ink-2);
  transition: background .15s; }
.ibtn:hover { background: var(--cc-hover); color: var(--ink); }

.body { flex: 1; min-height: 0; display: flex; gap: 8px; padding: 8px; }

/* ---- 侧栏 ---- */
/* 侧栏 = 岛：略浅灰面板，浮在白海上 */
.side { width: 240px; flex: none; background: var(--cc-side); border: 1px solid var(--line);
  border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 6px 16px rgba(0,0,0,.04);
  display: flex; flex-direction: column; padding: 8px; overflow: hidden; }

/* 三切换：抄 Notion 原理（选中展开成 图标+文字 药丸，未选只图标，丝滑切换）；风格用我们的 */
.modeseg { display: flex; gap: 2px; margin-bottom: 10px; }
.modeseg button { display: flex; align-items: center; gap: 7px; height: 32px; padding: 0 7px; border-radius: 9px;
  color: var(--ink-2); font-size: 13px; font-weight: 600; background: transparent;
  transition: background .2s, color .2s, padding .34s cubic-bezier(.2,.85,.25,1); }
.modeseg button:hover { background: var(--cc-hover); }
.modeseg button .ico { flex: none; display: grid; place-items: center; }
.modeseg button .lbl { max-width: 0; opacity: 0; overflow: hidden; white-space: nowrap;
  transition: max-width .34s cubic-bezier(.2,.85,.25,1), opacity .22s; }
.modeseg button.on { background: var(--cc-active); color: var(--ink); padding: 0 11px; }
.modeseg button.on .lbl { max-width: 120px; opacity: 1; }

.sact { display: flex; flex-direction: column; gap: 1px; }
.sitem { display: flex; align-items: center; gap: 11px; height: 32px; padding: 0 10px; border-radius: 8px;
  color: var(--ink); font-size: 13px; transition: background .12s; }
.sitem:hover { background: var(--cc-hover); }
.sitem .ico { width: 16px; display: grid; place-items: center; color: var(--ink-2); }
.sitem .beta { margin-left: auto; font-size: 10px; font-weight: 600; color: var(--ink-3);
  border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; }
.sitem .chev { margin-left: auto; color: var(--ink-3); }

.recents { flex: 1; min-height: 0; overflow-y: auto; margin-top: 10px; }
.rec-head { display: flex; align-items: center; padding: 4px 10px 6px; }
.rec-head span { flex: 1; font-size: 11px; font-weight: 600; color: var(--ink-3); }
.rec-head .ibtn { width: 22px; height: 22px; }
.ritem { display: flex; align-items: center; gap: 9px; height: 30px; padding: 0 10px; border-radius: 8px;
  color: var(--ink-2); font-size: 13px; white-space: nowrap; overflow: hidden; transition: background .12s; }
.ritem .d { width: 6px; height: 6px; border-radius: 50%; flex: none; border: 1.5px solid var(--ink-3); }
.ritem .d.run { background: var(--accent); border-color: var(--accent); }
.ritem .t { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.ritem:hover { background: var(--cc-hover); color: var(--ink); }
.ritem.on { background: var(--cc-active); color: var(--ink); }

.suser { display: flex; align-items: center; gap: 9px; padding: 7px 8px; margin-top: 6px;
  border-top: 1px solid var(--line); }
.suser .av { width: 26px; height: 26px; border-radius: 7px; flex: none; display: grid; place-items: center;
  background: #3b3b40; color: #fff; font-size: 11px; font-weight: 700; }
.suser .m { flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; }
.suser .m b { font-size: 13px; font-weight: 600; }
.suser .m .plan { font-size: 11px; color: var(--ink-3); }
.suser .chev { color: var(--ink-3); }

/* ---- 主区 ---- */
/* 主区 = 海：平铺，透明（露出窗内海色），无圆角/边框/阴影 */
.main { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
.conv { flex: 1; overflow-y: auto; }
.col { max-width: 860px; margin: 0 auto; padding: 28px 32px 8px; }

/* 消息 */
.turn { margin-bottom: 26px; }
.umsg { display: flex; justify-content: flex-end; margin-bottom: 26px; }
.umsg .b { background: var(--cc-bubble); border-radius: 16px;
  padding: 10px 15px; max-width: 80%; line-height: 1.55; }
.spark { display: flex; align-items: center; gap: 0; margin-bottom: 12px; color: var(--accent); }
.amsg { font-size: 14px; line-height: 1.65; }
.amsg p { margin: 0 0 12px; }
.amsg p:last-child { margin-bottom: 0; }
.amsg b { font-weight: 600; }
.amsg code { font-family: var(--mono); font-size: .9em; background: var(--cc-active); padding: 1px 5px; border-radius: 5px; }

/* 工具摘要行（Claude Code：实时态 → Used N tools › / Edited file +n -m ›） */
.tool { margin: 12px 0; }
.tool-h { display: inline-flex; align-items: center; gap: 8px; max-width: 100%; padding: 4px 8px; margin-left: -8px;
  border-radius: 8px; color: var(--ink-2); font-size: 13px; transition: background .12s; }
.tool-h.click { cursor: pointer; }
.tool-h.click:hover { background: var(--cc-hover); }
.tool-h .tk { color: var(--ink-2); }
.tool-h code { font-family: var(--mono); font-size: 12px; color: var(--ink); background: none; padding: 0; }
.tool-h .diff { font-family: var(--mono); font-size: 12px; }
.tool-h .add { color: var(--ok); } .tool-h .del { color: var(--danger); }
.tool-h .chev { color: var(--ink-3); transition: transform .15s; }
.tool.open .tool-h .chev { transform: rotate(90deg); }
/* 展开明细：缩进 + 左边线的「框」（与右侧面板同语言）；结构化步骤，行距舒服 */
.tool-d { display: none; margin: 6px 0 2px 9px; padding-left: 14px; border-left: 2px solid var(--line);
  font-size: 12px; color: var(--ink-2); }
.tool.open .tool-d { display: block; }
.tool-d .tc-step { padding: 9px 0; }
.tool-d .tc-step:first-child { padding-top: 2px; }
.tool-d .tc-step + .tc-step { border-top: 1px solid var(--line); }
.tool-d .sh { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink); }
.tool-d .sh code { font-family: var(--mono); font-size: 12.5px; color: var(--ink); }
.tool-d .sh .tgt { color: var(--ink-3); font-size: 12px; margin-left: auto; }
.tool-d .so { margin: 6px 0 0 16px; font-family: var(--mono); font-size: 12px; color: var(--ink-2); line-height: 1.85; white-space: pre-wrap; }
.pdot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); flex: none; display: inline-block; }
.tool.status .tool-h { color: var(--ink-3); }

/* 实体变更块：对话内的实体卡缩影，点开右侧岛看全貌（对话内框 × 右侧框成对） */
.tc-entity { display: flex; align-items: center; gap: 11px; padding: 10px 12px; margin: 12px 0;
  background: var(--cc-input); border: 1px solid var(--line); border-radius: 10px; cursor: pointer;
  transition: border-color .15s, background .15s; }
.tc-entity:hover { border-color: var(--line-strong); background: var(--cc-hover); }
.tc-entity .etype { width: 28px; height: 28px; border-radius: 8px; flex: none; display: grid; place-items: center; background: var(--cc-active); color: var(--ink-2); }
.tc-entity .en { flex: 1; min-width: 0; }
.tc-entity .en b { font-size: 13px; font-weight: 600; }
.tc-entity .en .d { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
.tc-entity .en .d code { font-family: var(--mono); }
.tc-entity .en .d .to { color: var(--ink); font-family: var(--mono); }
.tc-entity .go { font-size: 12px; color: var(--ink-3); flex: none; }

/* Codex 式工具卡（操作列表 + 增删数）+ diff 查看器（行号 · 绿增红删） */
.tcx { border: 1px solid var(--line); border-radius: 11px; overflow: hidden; background: var(--cc-input); margin: 12px 0; }
.tcx-h { display: flex; align-items: center; gap: 9px; padding: 9px 12px; font-size: 13px; color: var(--ink); }
.tcx.click .tcx-h { cursor: pointer; }
.tcx.click .tcx-h:hover { background: var(--cc-hover); }
.tcx-h .run { display: grid; place-items: center; color: var(--ink-3); }
.tcx-h .run svg { animation: spin 1s linear infinite; }
.tcx-h .stat { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
.stat .a { color: var(--ok); } .stat .d { color: var(--danger); }
.tcx-h .chev { margin-left: auto; color: var(--ink-3); transition: transform .18s; }
.tcx.open .tcx-h .chev { transform: rotate(90deg); }
.tcx-body { display: none; border-top: 1px solid var(--line); }
.tcx.open .tcx-body { display: block; }
.opr { display: flex; align-items: center; gap: 9px; padding: 9px 12px; font-size: 13px; }
.opr + .opr, .opr + .dvwrap { border-top: 1px solid var(--line); }
.opr .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); flex: none; }
.opr code { font-family: var(--mono); color: var(--ink); font-size: 12.5px; }
.opr .tgt { color: var(--ink-3); font-size: 12px; }
.opr .stat { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
.dvwrap { padding: 10px 12px 12px; }
.dv { border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
.dv-h { display: flex; align-items: center; gap: 8px; padding: 7px 11px; background: var(--cc-active); font-size: 12px; }
.dv-h code { font-family: var(--mono); color: var(--ink); }
.dv-h .stat { margin-left: auto; font-family: var(--mono); font-size: 11px; }
.dv-b { padding: 6px 0; font-family: var(--mono); font-size: 12px; }
.dl { display: flex; line-height: 1.85; }
.dl .n { width: 34px; flex: none; text-align: right; padding-right: 10px; color: var(--ink-3); opacity: .5; user-select: none; }
.dl .s { width: 13px; flex: none; text-align: center; color: var(--ink-3); }
.dl .c { flex: 1; padding-right: 12px; white-space: pre-wrap; color: var(--ink-2); }
.dl.add { background: color-mix(in srgb, var(--ok) 11%, transparent); }
.dl.add .s { color: var(--ok); } .dl.add .c { color: var(--ink); }
.dl.del { background: color-mix(in srgb, var(--danger) 9%, transparent); }
.dl.del .s { color: var(--danger); } .dl.del .c { color: var(--ink-3); }

/* 工具调用：复刻 Claude Code —— 折叠=一行(无框)；展开=外框+工具列表；每工具各自展开详情 */
.tg { margin: 12px 0; }
.tg-sum { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-3); font-size: 13px; cursor: pointer; padding: 2px 0; }
.tg-sum:hover { color: var(--ink-2); }
.tg-sum .run { display: inline-grid; place-items: center; }
.tg-sum .run svg { animation: spin 1s linear infinite; }
.tg-sum .chev { color: var(--ink-3); transition: transform .18s; }
.tg.open > .tg-sum .chev { transform: rotate(90deg); }
.tg-list { display: none; margin-top: 8px; border: 1px solid var(--line); border-radius: 12px; padding: 4px; }
.tg.open > .tg-list { display: block; }
.ti-sum { display: flex; align-items: center; gap: 7px; color: var(--ink-3); font-size: 13px; cursor: pointer; padding: 7px 9px; border-radius: 8px; }
.ti-sum:hover { background: var(--cc-hover); }
.ti-sum .v { color: var(--ink-3); }
.ti-sum .nm { color: var(--ink); font-family: var(--mono); font-size: 12.5px; }
.ti-sum .chev { margin-left: auto; color: var(--ink-3); transition: transform .18s; }
.ti.open > .ti-sum .chev { transform: rotate(90deg); }
.ti-det { display: none; padding: 0 9px 8px; }
.ti.open > .ti-det { display: block; }
.tbox { border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
.tbox .lbl { padding: 6px 11px; font-size: 12px; color: var(--ink-2); border-bottom: 1px solid var(--line); background: var(--cc-active); font-family: var(--mono); }
.tbox .out { padding: 9px 12px; font-family: var(--mono); font-size: 12px; line-height: 1.85; color: var(--ink-2); white-space: pre-wrap; }
.tbox .diff { padding: 6px 0; }
.dline { display: flex; padding: 0 12px; line-height: 1.85; font-family: var(--mono); font-size: 12px; }
.dline .s { width: 14px; flex: none; color: var(--ink-3); }
.dline .c { flex: 1; white-space: pre-wrap; color: var(--ink-2); }
.dline.add { background: color-mix(in srgb, var(--ok) 11%, transparent); }
.dline.add .s { color: var(--ok); } .dline.add .c { color: var(--ink); }
.dline.del { background: color-mix(in srgb, var(--danger) 9%, transparent); }
.dline.del .s { color: var(--danger); } .dline.del .c { color: var(--ink-3); }

/* ---- 底部 composer ---- */
.composer { flex: none; padding: 0 32px 18px; }
.cwrap { max-width: 860px; margin: 0 auto; }
.ctx { display: flex; align-items: center; gap: 10px; padding: 7px 12px; margin-bottom: 8px;
  background: var(--cc-input); border: 1px solid var(--line); border-radius: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,.04); font-size: 12px; color: var(--ink-2); }
.ctx .repo { display: flex; align-items: center; gap: 6px; font-weight: 500; color: var(--ink); }
.ctx .branch { display: flex; align-items: center; gap: 5px; color: var(--ink-2); }
.ctx .diff { font-family: var(--mono); font-size: 12px; margin-left: auto; }
.ctx .diff .add { color: var(--ok); } .ctx .diff .del { color: var(--danger); }
.ctx .pr { display: flex; align-items: center; gap: 6px; height: 26px; padding: 0 11px; border-radius: 7px;
  border: 1px solid var(--line); background: var(--island); font-weight: 600; color: var(--ink); }
.ctx .pr:hover { background: var(--cc-hover); }
.box { border: 1px solid var(--line); border-radius: 16px; background: var(--cc-input); box-shadow: 0 1px 2px rgba(0,0,0,.03); }
.box:focus-within { border-color: var(--line-strong); }
.box .field { display: flex; align-items: center; gap: 8px; padding: 13px 14px 6px; }
.box .field input { flex: 1; border: 0; outline: 0; background: none; font: inherit; font-size: 14px; color: var(--ink); }
.box .field input::placeholder { color: var(--ink-3); }
.box .field .enter { color: var(--ink-3); }
.bar { display: flex; align-items: center; gap: 4px; padding: 4px 8px 8px; }
.cbtn { height: 28px; padding: 0 9px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px;
  color: var(--ink-2); font-size: 12px; font-weight: 500; transition: background .12s; }
.cbtn:hover { background: var(--cc-hover); color: var(--ink); }
.cbtn.ic { width: 28px; padding: 0; justify-content: center; }
.bar .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.bar .right .lbl { font-size: 12px; color: var(--ink-3); }
.bar .right .spin { color: var(--ink-3); display: grid; place-items: center; }
.bar .right .spin svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== 右侧实体卡 = 岛（信号交互：AI 触碰实体时从右滑入、流式编辑） ===== */
/* 同样的白/深 + 海岸线，默认收起(宽0)，唤出时滑入 */
.aside { flex: none; width: 0; opacity: 0; overflow: hidden; margin-left: -8px;
  background: var(--cc-side); border: 1px solid var(--line); border-radius: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 6px 16px rgba(0,0,0,.04);
  display: flex; flex-direction: column;
  transition: width .42s cubic-bezier(.2,.85,.25,1), opacity .3s, margin-left .42s cubic-bezier(.2,.85,.25,1); }
.aside.show { width: 384px; opacity: 1; margin-left: 0; }
.aside-head { display: flex; align-items: center; gap: 10px; padding: 11px 8px 11px 14px; border-bottom: 1px solid var(--line); flex: none; }
.etype { width: 30px; height: 30px; border-radius: 8px; flex: none; display: grid; place-items: center;
  background: var(--cc-active); color: var(--ink-2); }   /* 中性，不再用强调色大块 */
.aside-head .ht { flex: 1; min-width: 0; }
.aside-head .ht b { display: block; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.aside-head .ht .sub { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--ink-3); margin-top: 1px; }
.ver { font-family: var(--mono); background: var(--cc-active); color: var(--ink-2); padding: 0 6px; border-radius: 5px; }
.live { display: inline-flex; align-items: center; gap: 5px; color: var(--ink-2); font-weight: 500; font-size: 11px; }
.live .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .85; animation: pulse 1.4s ease infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--accent-soft); } 70% { box-shadow: 0 0 0 7px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
.aside-tabs { display: flex; gap: 2px; padding: 8px 10px; border-bottom: 1px solid var(--line); flex: none; }
.aside-tabs button { font-size: 12px; color: var(--ink-3); padding: 5px 10px; border-radius: 8px; font-weight: 500; transition: background .15s, color .15s; }
.aside-tabs button.on { background: var(--cc-active); color: var(--ink); font-weight: 600; }
.aside-body { flex: 1; overflow-y: auto; padding: 14px; }
.ec-desc { font-size: 13px; color: var(--ink-2); line-height: 1.55; margin-bottom: 16px; }
.field > label .ct { color: var(--ink-3); font-weight: 500; margin-left: 5px; text-transform: none; letter-spacing: 0; }
.ec-foot { flex: none; border-top: 1px solid var(--line); padding: 9px 14px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-3); }
.ec-foot .mono { font-family: var(--mono); }
.ec-foot .gap { flex: 1; }
.ec-foot .act { color: var(--ink-2); font-weight: 500; cursor: pointer; }
.ec-foot .act:hover { color: var(--ink); }
.field { margin-bottom: 16px; }
.field > label { display: block; font-size: 11px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.field .val { background: var(--cc-input); border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px; font-size: 13px; white-space: pre-wrap; transition: box-shadow .4s, border-color .4s, background .4s; }
.field .val.mono { font-family: var(--mono); font-size: 12px; line-height: 1.6; }
.field .val.flash { animation: flash 1.4s ease; }
@keyframes flash { 0% { background: var(--cc-active); border-color: var(--line-strong); } 100% { } }
.taglist { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px; background: var(--cc-input); border: 1px solid var(--line); font-size: 11px; font-family: var(--mono); color: var(--ink-2); }
.tag.new { animation: popin .3s cubic-bezier(.2,.85,.25,1); }  /* 中性 tag，仅靠弹入动画提示「新增」 */
@keyframes popin { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.caret { display: inline-block; width: 6px; height: 1em; vertical-align: -2px; background: var(--accent); border-radius: 1px; margin-left: 1px; animation: blink 1s steps(2) infinite; }
@keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }

/* 会话内：sparkle 标记 + amsg + 工具运行态 + editline + ref 药丸 */
.turn { margin-bottom: 26px; }
.umsg { display: flex; justify-content: flex-end; margin-bottom: 26px; }
.spark { display: flex; color: var(--accent); margin-bottom: 12px; }
.amsg { font-size: 14px; line-height: 1.65; }
.amsg p { margin: 0 0 12px; } .amsg p:last-child { margin-bottom: 0; }
.amsg b { font-weight: 600; }
.amsg code { font-family: var(--mono); font-size: .9em; background: var(--cc-active); padding: 1px 5px; border-radius: 5px; }
.tool-h .run { display: grid; place-items: center; color: var(--ink-3); }
.tool-h .run svg { animation: spin 1s linear infinite; }
.ref-pill { display: inline-flex; align-items: center; gap: 4px; padding: 1px 9px 1px 7px; border-radius: 999px; background: var(--cc-active); color: var(--ink); border: 1px solid var(--line); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
.ref-pill:hover { background: var(--cc-hover); }
</style>
</head>
<body>
<div class="win">

  <div class="body">
    <!-- ===== 左岛（红绿灯/收起/搜索都在岛内 + 模式段 + 会话） ===== -->
    <aside class="side">
      <div class="side-top">
        <div class="lights"><span class="light r"></span><span class="light y"></span><span class="light g"></span></div>
        <span class="grow"></span>
        <button class="ibtn" id="i_side"></button>
        <button class="ibtn" id="i_search"></button>
      </div>
      <div class="modeseg" id="modeseg">
        <button data-m="chat"><span class="ico" id="i_chat"></span><span class="lbl">Chat</span></button>
        <button data-m="tasks"><span class="ico" id="i_tasks"></span><span class="lbl">Tasks</span></button>
        <button class="on" data-m="code"><span class="ico" id="i_code"></span><span class="lbl">Code</span></button>
      </div>

      <div class="sact">
        <button class="sitem"><span class="ico" id="i_new"></span> New session</button>
        <button class="sitem"><span class="ico" id="i_rt"></span> Routines</button>
        <button class="sitem"><span class="ico" id="i_dp"></span> Dispatch <span class="beta">Beta</span></button>
        <button class="sitem"><span class="ico" id="i_cz"></span> Customize</button>
        <button class="sitem"><span class="ico" id="i_more"></span> More</button>
      </div>

      <div class="recents">
        <div class="rec-head"><span>Recents</span><button class="ibtn" id="i_sort"></button></div>
        <div id="reclist"></div>
      </div>

      <div class="suser">
        <span class="av">sw</span>
        <span class="m"><b>Sun Weilin</b><span class="plan">· Max</span></span>
        <span class="chev" id="i_cu"></span>
      </div>
    </aside>

    <!-- ===== 主区 ===== -->
    <main class="main">
      <div class="main-head">
        <div class="crumb"><span class="ico" id="i_repo"></span> Forgify <span class="sep">/</span>
          <span class="muted">前端设计 (fork)</span> <span class="chev" id="i_cd"></span></div>
        <span class="grow"></span>
        <button class="ibtn" id="i_replay" title="重播信号交互"></button>
        <button class="ibtn" id="i_theme"></button>
        <button class="ibtn" id="i_panel"></button>
      </div>
      <div class="conv" id="conv">
        <div class="col" id="col"></div>
      </div>

      <!-- ===== composer ===== -->
      <div class="composer">
        <div class="cwrap">
          <div class="ctx">
            <span class="repo"><span id="i_repo2"></span> Forgify</span>
            <span class="branch"><span id="i_branch"></span> main</span>
            <span class="diff"><span class="add">+172</span> <span class="del">−1</span></span>
            <button class="pr">Create PR <span id="i_prc"></span></button>
          </div>
          <div class="box">
            <div class="field"><input id="ta" placeholder="Type / for commands"><span class="enter" id="i_enter"></span></div>
            <div class="bar">
              <button class="cbtn" id="b_auto">Auto <span id="i_autoc"></span></button>
              <button class="cbtn ic" id="b_plus"></button>
              <button class="cbtn ic" id="b_mic"></button>
              <span class="right">
                <span class="lbl">Opus 4.8</span><span class="lbl">Ultracode</span>
                <span class="spin" id="i_spin"></span>
              </span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ===== 右侧实体卡 = 岛（信号交互：AI 触碰实体时从右滑入、流式编辑） ===== -->
    <aside class="aside" id="aside"></aside>
  </div>
</div>

<script>
const $ = (s, r=document) => r.querySelector(s);
// —— 图标集（线性描边，1.7） ——
const P = {
  side:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  repo:'<rect x="2" y="4" width="20" height="14" rx="2"/><path d="M2 18h20M8 22h8"/>',
  chevd:'<path d="m6 9 6 6 6-6"/>', chevr:'<path d="m9 6 6 6-6 6"/>',
  panel:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>', sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
  chat:'<path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 9 9 0 0 1-4-1L3 20l1.5-5.5a8.5 8.5 0 1 1 16.5-3Z"/>',
  tasks:'<path d="M11 6h10M11 12h10M11 18h10"/><path d="m3 6 1.5 1.5L7 5M3 12l1.5 1.5L7 11M3 18l1.5 1.5L7 17"/>',
  code:'<path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  zap:'<path d="M13 2 3 14h9l-1 8 10-12h-9z"/>',
  dispatch:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.5Z"/>',
  sliders:'<path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/>',
  more:'<circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>',
  sort:'<path d="M11 5h10M11 9h7M11 13h4M3 17l3 3 3-3M6 4v16"/>',
  branch:'<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="9" r="3"/><path d="M18 12a9 9 0 0 1-9 9M6 9v6"/>',
  enter:'<path d="M9 10 4 15l5 5"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/>',
  mic:'<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3"/>',
  spin:'<path d="M21 12a9 9 0 1 1-6.2-8.5"/>',
  spark:'<path d="M12 2v6M12 16v6M2 12h6M16 12h6M5 5l3.5 3.5M15.5 15.5 19 19M19 5l-3.5 3.5M8.5 15.5 5 19"/>',
  agent:'<rect x="5" y="8" width="14" height="11" rx="3"/><path d="M12 8V5M9 3h6"/><circle cx="9.5" cy="13" r="1.2"/><circle cx="14.5" cy="13" r="1.2"/>',
  close:'<path d="M18 6 6 18M6 6l12 12"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
};
const svg = (k, n=16, w=1.7) => `<svg width="${n}" height="${n}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${P[k]}</svg>`;

// 注入图标
$('#i_side').innerHTML = svg('side'); $('#i_search').innerHTML = svg('search');
$('#i_repo').innerHTML = svg('repo',15); $('#i_cd').innerHTML = svg('chevd',14);
$('#i_panel').innerHTML = svg('panel'); $('#i_theme').innerHTML = svg('moon');
$('#i_chat').innerHTML = svg('chat',15); $('#i_tasks').innerHTML = svg('tasks',15); $('#i_code').innerHTML = svg('code',15);
$('#i_new').innerHTML = svg('plus'); $('#i_rt').innerHTML = svg('zap'); $('#i_dp').innerHTML = svg('dispatch');
$('#i_cz').innerHTML = svg('sliders'); $('#i_more').innerHTML = svg('chevd',14); $('#i_sort').innerHTML = svg('sort',15);
$('#i_cu').innerHTML = svg('chevd',14);
$('#i_repo2').innerHTML = svg('repo',14); $('#i_branch').innerHTML = svg('branch',13); $('#i_prc').innerHTML = svg('chevd',13);
$('#i_enter').innerHTML = svg('enter',16); $('#i_autoc').innerHTML = svg('chevd',13);
$('#b_plus').innerHTML = svg('plus',17); $('#b_mic').innerHTML = svg('mic',16); $('#i_spin').innerHTML = svg('spin',14);
document.querySelectorAll('.spark').forEach(s => s.innerHTML = svg('spark',16,1.6));
document.querySelectorAll('[data-chev]').forEach(c => c.innerHTML = svg('chevr',14));

// Recents 列表
const SESS = [
  ['前端设计 (fork)','run',true],['前端部署','run',false],['Backend重构 [Done]','done',false],
  ['列名检查 [adhoc]','done',false],['版本控制管理 [done]','done',false],['Workflow重构 Implement [done]','done',false],
  ['Workflow重构 Review [done]','done',false],['HardCode治理专项 [done]','done',false],
  ['Workflow Feature迭代探索 [done]','done',false],['E2E修复 [Done]','done',false],['Testend修复 [Done]','done',false],
  ['API模型配置迭代 [Done]','done',false],['前端文档页面优化 [Done]','done',false],
];
$('#reclist').innerHTML = SESS.map(([t,st,on]) =>
  `<div class="ritem${on?' on':''}"><span class="d${st==='run'?' run':''}"></span><span class="t">${t}</span></div>`).join('');
$('#reclist').querySelectorAll('.ritem').forEach(it => it.onclick = () => {
  $('#reclist').querySelectorAll('.ritem').forEach(x=>x.classList.remove('on')); it.classList.add('on');
});

// 交互
document.querySelectorAll('.tool-h.click').forEach(h => h.onclick = () => h.closest('.tool').classList.toggle('open'));
$('#modeseg').querySelectorAll('button').forEach(b => b.onclick = () => {
  $('#modeseg').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
});
$('#i_theme').onclick = () => {
  const d = document.documentElement.dataset.theme === 'dark';
  document.documentElement.dataset.theme = d ? 'light' : 'dark';
  $('#i_theme').innerHTML = svg(d ? 'moon' : 'sun');
};

// ===== 信号交互：对话动画编排 + 右侧实体卡岛 =====
$('#i_replay').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const col = $('#col'), aside = $('#aside'), conv = $('#conv');
const sleep = ms => new Promise(r => setTimeout(r, ms));
let runId = 0; const alive = id => id === runId;
const toBottom = () => { conv.scrollTop = conv.scrollHeight; };

function typeInto(node, text, cps = 58){
  const id = runId;
  return new Promise(res => {
    const caret = document.createElement('span'); caret.className = 'caret'; node.appendChild(caret);
    let i = 0;
    (function step(){
      if(!alive(id)){ caret.remove(); return res(); }
      caret.insertAdjacentText('beforebegin', text[i++] ?? '');
      toBottom();
      if(i > text.length){ caret.remove(); return res(); }
      setTimeout(step, 1000 / cps + Math.random() * 16);
    })();
  });
}
function userMsg(html){ const m = document.createElement('div'); m.className = 'umsg'; m.innerHTML = `<div class="b">${html}</div>`; col.appendChild(m); toBottom(); }
function aiTurn(){ const t = document.createElement('div'); t.className = 'turn';
  t.innerHTML = `<div class="spark">${svg('spark',16,1.6)}</div><div class="amsg"></div>`; col.appendChild(t); toBottom(); return $('.amsg', t); }
function para(body){ const p = document.createElement('p'); body.appendChild(p); return p; }

// 工具调用组（复刻 Claude Code）：运行态(spinner + 实时文案) → 收敛「Used N tools ›」+ 外框工具列表（每个各自展开详情）
function toolAct(body){
  const w = document.createElement('div'); w.className = 'tg';
  w.innerHTML = `<div class="tg-sum"><span class="run">${svg('spin',14)}</span><span class="tk"></span>
    <span class="chev" style="display:none">${svg('chevr',14)}</span></div><div class="tg-list"></div>`;
  body.appendChild(w); toBottom();
  const sum = $('.tg-sum', w), run = $('.run', w), tk = $('.tk', w), chev = $('.chev', w), list = $('.tg-list', w);
  sum.onclick = () => { if(list.innerHTML) w.classList.toggle('open'); };
  return { status(t){ tk.textContent = t; toBottom(); },
    settle(summary, itemsHTML){
      run.remove(); tk.textContent = summary; list.innerHTML = itemsHTML; chev.style.display = ''; w.classList.add('open');
      list.querySelectorAll('.ti-sum').forEach(s => s.onclick = () => s.closest('.ti').classList.toggle('open'));
      toBottom();
    } };
}

// 右侧实体卡（岛）：渲染 Agent + 滑入
function renderAgent(a){
  aside.classList.add('show');
  aside.innerHTML = `
    <div class="aside-head">
      <span class="etype">${svg('agent',17)}</span>
      <span class="ht"><b>${a.name}</b><span class="sub">Agent · <span class="ver" data-ver>v${a.version}</span></span></span>
      <span data-live>${a.live ? '<span class="live"><span class="pulse"></span>编辑中</span>' : ''}</span>
      <button class="ibtn" data-close>${svg('close',16)}</button>
    </div>
    <div class="aside-tabs"><button class="on">Overview</button><button>Versions</button><button>Runs</button><button>Iterate</button></div>
    <div class="aside-body">
      ${a.desc ? `<div class="ec-desc">${a.desc}</div>` : ''}
      <div class="field" data-f="model"><label>Model</label><div class="val mono">${a.model}</div></div>
      <div class="field" data-f="system"><label>System prompt</label><div class="val">${a.system}</div></div>
      <div class="field" data-f="tools"><label>Tools <span class="ct" data-tc>${a.tools.length}</span></label><div class="val" style="padding:8px"><div class="taglist">${a.tools.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div></div>
    </div>
    <div class="ec-foot"><span class="mono">ag_7f3c2a91</span> · 12 runs<span class="gap"></span><span class="act">历史版本</span></div>`;
  $('[data-close]', aside).onclick = () => aside.classList.remove('show');
  aside.querySelectorAll('.aside-tabs button').forEach(b => b.onclick = () => {
    aside.querySelectorAll('.aside-tabs button').forEach(x => x.classList.remove('on')); b.classList.add('on'); });
}
function setLive(on){ const s = $('[data-live]', aside); if(s) s.innerHTML = on
  ? '<span class="live"><span class="pulse"></span>编辑中</span>'
  : '<span class="live" style="opacity:.65">已保存</span>'; }

// 编排
async function runDemo(){
  const id = ++runId;
  col.innerHTML = ''; aside.classList.remove('show'); aside.innerHTML = '';

  userMsg('帮我把仓库这周的 PR 理一理。');
  const h = aiTurn();
  h.innerHTML = `<p>这周有 9 个 PR，其中 3 个还在等审。要我让 <span class="ref-pill" data-open>${svg('agent',12)}Researcher</span> 出一份带链接的周报吗？</p>`;
  if(!alive(id)) return; await sleep(700);

  userMsg('把 Researcher 升级到 Opus，并要求它所有结论都带引用来源。');
  await sleep(450); if(!alive(id)) return;
  const body = aiTurn();
  await typeInto(para(body), '好的，我来更新 Researcher：切换模型到 claude-opus-4-8，并在系统提示里加上引用要求。', 66);
  if(!alive(id)) return;

  await sleep(250);
  const ta = toolAct(body); ta.status('Reading Researcher…');
  await sleep(800); if(!alive(id)) return;
  ta.status('Updating Researcher…');           // ← 这一刻唤出右岛
  await sleep(350); if(!alive(id)) return;
  renderAgent({ name:'Researcher', version:4, model:'claude-sonnet-4-6',
    desc:'深度调研助手：检索、交叉验证，产出带引用的结构化综述。',
    system:'你是严谨的调研助手。检索、交叉验证、给出结构化综述。',
    tools:['web_fetch','read_file','python','summarize'], live:true });
  await sleep(650); if(!alive(id)) return;

  const mv = $('[data-f="model"] .val', aside); mv.classList.add('flash'); mv.textContent = 'claude-opus-4-8';
  await sleep(900); if(!alive(id)) return;
  const sv = $('[data-f="system"] .val', aside); sv.classList.add('flash');
  await typeInto(sv, '\n\n务必为每条结论附引用来源（行内链接）。', 42);
  if(!alive(id)) return; await sleep(500);
  const tl = $('[data-f="tools"] .taglist', aside);
  const nt = document.createElement('span'); nt.className = 'tag new'; nt.textContent = 'web_search'; tl.appendChild(nt);
  $('[data-tc]', aside).textContent = tl.children.length;
  await sleep(700); if(!alive(id)) return;

  $('[data-ver]', aside).textContent = 'v5'; setLive(false);
  ta.settle('Used 2 tools', `
    <div class="ti">
      <div class="ti-sum"><span class="v">Used</span> <span class="nm">read_agent(Researcher)</span> <span class="chev">${svg('chevr',14)}</span></div>
      <div class="ti-det"><div class="tbox"><div class="lbl">read_agent → Researcher</div><div class="out">model: claude-sonnet-4-6
tools: web_fetch, read_file, python, summarize</div></div></div>
    </div>
    <div class="ti open">
      <div class="ti-sum"><span class="v">Used</span> <span class="nm">update_agent(Researcher)</span> <span class="chev">${svg('chevr',14)}</span></div>
      <div class="ti-det"><div class="tbox"><div class="lbl">update_agent → agent Researcher</div><div class="diff">
        <div class="dline del"><span class="s">−</span><span class="c">model: claude-sonnet-4-6</span></div>
        <div class="dline add"><span class="s">+</span><span class="c">model: claude-opus-4-8</span></div>
        <div class="dline add"><span class="s">+</span><span class="c">system += 务必为每条结论附引用来源（行内链接）</span></div>
        <div class="dline add"><span class="s">+</span><span class="c">tools += web_search</span></div>
      </div></div></div>
    </div>`);
  await sleep(350); if(!alive(id)) return;
  await typeInto(para(body), '完成 ✅ Researcher 现在跑在 Opus 上，每条结论都会附引用。', 66);

  col.querySelectorAll('[data-open]').forEach(p => p.onclick = () => aside.classList.add('show'));
}

$('#i_replay').onclick = runDemo;
$('#i_enter').onclick = runDemo;
$('#i_panel').onclick = () => aside.classList.toggle('show');
runDemo();
</script>
</body>
</html>
