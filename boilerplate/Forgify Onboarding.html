<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>欢迎使用 Forgify</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap");

    :root {
      --paper:#FAFAF7; --ink:#37352F;
      --ink-soft:rgba(55,53,47,.65); --ink-faint:rgba(55,53,47,.42);
      --border:rgba(55,53,47,.16); --border-soft:rgba(55,53,47,.09);
      --bg-elev:#FFFFFF; --bg-elev-2:#F7F7F5; --bg-hover:rgba(55,53,47,.05);
      --accent:#D97757; --accent-soft:rgba(217,119,87,.12); --accent-ring:rgba(217,119,87,.25); --accent-fg:#FFFFFF;
      --status-success:#0F7B6C; --status-error:#E03E3E;
      --font-sans:"Inter","Noto Sans SC",-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
      --font-mono:"JetBrains Mono","SF Mono",monospace;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:var(--font-sans);
      color:var(--ink);
      background:var(--paper);
      -webkit-font-smoothing:antialiased;
      letter-spacing:-.005em;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* Decorative gradient orbs */
    body::before, body::after {
      content:"";
      position:fixed; pointer-events:none;
      width:600px; height:600px; border-radius:50%;
      filter:blur(80px); opacity:.35;
      z-index:0;
    }
    body::before{ background:var(--accent); top:-200px; left:-200px; }
    body::after{ background:#37352f; bottom:-200px; right:-200px; opacity:.10; }

    .stage {
      position:relative; z-index:1;
      width: min(960px, 100% - 40px);
      height: min(640px, 100vh - 40px);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 1px 3px rgba(15,15,15,.04), 0 30px 80px -30px rgba(15,15,15,.20);
      overflow:hidden;
      display:grid;
      grid-template-columns: 320px 1fr;
    }

    /* ───────── Left rail: brand + step nav ───────── */
    .rail {
      background: var(--bg-elev-2);
      padding: 32px 28px;
      display:flex; flex-direction:column; gap:32px;
      border-right: 1px solid var(--border-soft);
    }
    .brand {
      display:flex; align-items:center; gap:10px;
    }
    .mark {
      width:32px; height:32px;
      border-radius:7px;
      background:#2C2C2C;
      position:relative;
      flex-shrink:0;
    }
    .mark svg { display:block; width:100%; height:100%; }
    .brand-name { font-size:15px; font-weight:600; letter-spacing:-.01em; }
    .brand-sub  { font-size:11px; color:var(--ink-faint); margin-top:1px; font-family:var(--font-mono); }

    .steps { display:flex; flex-direction:column; gap:4px; }
    .step {
      display:flex; align-items:flex-start; gap:12px;
      padding:10px 12px;
      border-radius:8px;
      background:transparent;
      border:0;
      width:100%; text-align:left;
      cursor:default;
      transition: background 120ms;
    }
    .step.is-active { background: var(--bg-elev); border:1px solid var(--border-soft); box-shadow: var(--shadow-sm); }
    .step-num {
      width:22px; height:22px;
      border-radius:50%;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      display:grid; place-items:center;
      font-size:11px; font-weight:600;
      color: var(--ink-faint);
      flex-shrink:0;
      font-family:var(--font-mono);
    }
    .step.is-done .step-num { background: var(--status-success); border-color: var(--status-success); color:white; }
    .step.is-active .step-num { background: var(--accent); border-color: var(--accent); color:var(--accent-fg); }
    .step-text { flex:1; min-width:0; }
    .step-title { font-size:13px; color: var(--ink); font-weight:500; }
    .step.is-active .step-title { font-weight:600; }
    .step:not(.is-active):not(.is-done) .step-title { color: var(--ink-faint); }
    .step-desc { font-size:11px; color: var(--ink-faint); margin-top:2px; line-height:1.45; }

    .rail-footer {
      margin-top:auto;
      font-size:11px;
      color:var(--ink-faint);
      line-height:1.6;
    }

    /* ───────── Right pane: step content ───────── */
    .content {
      display:flex; flex-direction:column;
      padding:48px 56px 24px 56px;
      min-height:0;
      position:relative;
    }
    .content-head { margin-bottom: 32px; }
    .content-title { font-size: 28px; font-weight:700; letter-spacing:-.02em; }
    .content-sub { font-size:14px; color:var(--ink-soft); margin-top:6px; line-height:1.55; max-width:520px; }

    .content-body { flex:1; min-height:0; overflow-y:auto; padding-right:8px; margin-right:-8px; }

    .field { display:flex; flex-direction:column; gap:6px; margin-bottom: 18px; }
    .field-label { font-size:11px; font-weight:600; color: var(--ink-faint); text-transform: uppercase; letter-spacing:.06em; }
    .field-hint  { font-size:11px; color: var(--ink-faint); margin-top:-2px; }
    .input {
      width:100%;
      padding:10px 12px;
      font-size:15px;
      font-family:var(--font-sans);
      color: var(--ink);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline:none;
      transition: border-color 120ms, box-shadow 120ms;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
    .input.lg { font-size:18px; padding:12px 14px; }

    .avatar-row { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
    .avatar-preview {
      width:56px; height:56px;
      border-radius:50%;
      display:grid; place-items:center;
      color:white; font-weight:600; font-size:22px;
      transition: background 200ms;
    }

    .color-swatches { display:flex; gap:8px; flex-wrap:wrap; }
    .swatch {
      width:32px; height:32px; border-radius:50%;
      border: 2px solid var(--border);
      cursor:pointer;
      transition: transform 120ms;
    }
    .swatch:hover { transform: scale(1.08); }
    .swatch.is-active { border-color: var(--ink); box-shadow: 0 0 0 2px var(--bg-elev) inset, 0 0 0 4px var(--accent-ring); }

    .seg { display:inline-flex; background: var(--bg-elev-2); border:1px solid var(--border-soft); border-radius:6px; padding:2px; gap:2px; }
    .seg-btn { background:transparent; border:0; padding:5px 12px; border-radius:4px; font-size:12px; color: var(--ink-faint); cursor:pointer; }
    .seg-btn:hover { color: var(--ink); }
    .seg-btn.is-active { background: var(--bg-elev); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.04); font-weight:500; }

    .provider-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; }
    .provider-card {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border: 1px solid var(--border-soft);
      border-radius:6px;
      background: var(--bg-elev);
      cursor:pointer;
      transition: border-color 120ms;
      text-align:left;
    }
    .provider-card:hover { border-color: var(--border); }
    .provider-card.is-active { border-color: var(--accent); background: var(--accent-soft); }
    .provider-card .pchip {
      width:28px; height:28px; border-radius:5px;
      display:grid; place-items:center;
      font-family:var(--font-mono); font-size:11px; font-weight:700;
      color:white;
    }
    .provider-card .pname { font-size:13px; font-weight:500; color: var(--ink); }
    .provider-card .pdesc { font-size:11px; color: var(--ink-faint); margin-top:1px; }

    .skill-row {
      display:flex; align-items:center; gap:10px;
      padding:8px 10px;
      border-radius:5px;
      transition: background 120ms;
    }
    .skill-row:hover { background: var(--bg-hover); }
    .skill-check {
      width:18px; height:18px;
      border:1.5px solid var(--border);
      border-radius:4px;
      display:grid; place-items:center;
      flex-shrink:0;
    }
    .skill-check.is-on { background: var(--accent); border-color: var(--accent); }
    .skill-check.is-on svg { color: white; width:11px; height:11px; }
    .skill-name { font-size:13px; color: var(--ink); font-weight:500; }
    .skill-desc { font-size:11px; color: var(--ink-faint); margin-top:1px; }

    .done-stage { text-align:center; padding-top:24px; }
    .done-mark {
      width:72px; height:72px;
      border-radius:50%;
      background: var(--status-success);
      color:white;
      display:grid; place-items:center;
      margin: 0 auto 18px;
      box-shadow: 0 1px 2px rgba(15,123,108,.20), 0 18px 40px -16px rgba(15,123,108,.50);
    }
    .done-mark svg { width:28px; height:28px; }
    .done-title { font-size:26px; font-weight:700; letter-spacing:-.02em; }
    .done-sub { font-size:14px; color: var(--ink-soft); margin-top:8px; }
    .done-card-list { margin-top:24px; display:grid; grid-template-columns: 1fr 1fr; gap:8px; max-width:480px; margin-left:auto; margin-right:auto; }
    .done-card {
      padding:12px 14px;
      border:1px dashed var(--border);
      border-radius:6px;
      text-align:left;
    }
    .done-card-label { font-size:10px; color: var(--ink-faint); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
    .done-card-value { font-size:13px; color: var(--ink); font-family:var(--font-mono); margin-top:4px; }

    /* ───────── Bottom action bar ───────── */
    .actions {
      display:flex; align-items:center;
      padding: 16px 56px 24px 56px;
      border-top: 1px solid var(--border-soft);
      gap: 12px;
      background: var(--bg-elev-2);
    }
    .actions-progress {
      flex:1;
      font-size:11px; color: var(--ink-faint);
      font-family:var(--font-mono);
    }
    .progress-bar {
      height: 3px;
      background: var(--border-soft);
      border-radius: 2px;
      overflow:hidden;
      margin-top:4px;
      max-width: 240px;
    }
    .progress-bar > div {
      height:100%;
      background: var(--accent);
      transition: width 300ms cubic-bezier(.2,.8,.2,1);
    }
    .btn {
      display:inline-flex; align-items:center; gap:6px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--ink);
      cursor:pointer;
      font-family: var(--font-sans);
    }
    .btn:hover { background: var(--bg-hover); }
    .btn.btn-ghost { background:transparent; border-color:transparent; color: var(--ink-soft); }
    .btn.btn-ghost:hover { color: var(--ink); background: var(--bg-hover); }
    .btn.btn-accent {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
      box-shadow: 0 1px 2px rgba(217,119,87,.30);
    }
    .btn.btn-accent:hover { background: #c5664a; }
    .btn:disabled { opacity:0.4; cursor: not-allowed; }
    .btn svg { width:14px; height:14px; }

    kbd {
      display:inline-flex; align-items:center;
      padding: 0 5px; height: 18px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius:4px;
      font: 500 11px var(--font-mono);
      color: var(--ink-faint);
    }
  </style>
</head>
<body>

  <!-- ───────── Shared SVG mark ───────── -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="forge-mark" viewBox="0 0 1024 1024">
        <path d="M 512 248 L 568 416 L 736 472 L 568 528 L 512 696 L 456 528 L 288 472 L 456 416 Z" fill="#E08862"/>
        <rect x="232" y="736" width="560" height="76" rx="14" fill="white"/>
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </symbol>
      <symbol id="i-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </symbol>
      <symbol id="i-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M11 19l-7-7 7-7"/>
      </symbol>
    </defs>
  </svg>

  <div class="stage" id="stage">
    <!-- Filled by JS -->
  </div>

  <script>
    // ───────── State ─────────
    const accentPalette = [
      { id: "claude", hex: "#D97757", label: "Claude 橙" },
      { id: "blue",   hex: "#2383E2", label: "Notion 蓝" },
      { id: "ink",    hex: "#37352F", label: "墨" },
      { id: "green",  hex: "#0F7B6C", label: "森林绿" },
      { id: "purple", hex: "#6940A5", label: "紫" },
    ];
    const providers = [
      { id: "deepseek",  name: "DeepSeek",  bg: "#4D6BFE", abbr: "DS" },
      { id: "anthropic", name: "Anthropic", bg: "#D97757", abbr: "AN" },
      { id: "qwen",      name: "Qwen / 通义", bg: "#615CED", abbr: "QW" },
      { id: "ollama",    name: "Ollama (本地)", bg: "#37352F", abbr: "OL" },
    ];
    const skills = [
      { id: "csv",    name: "csv-cleaner",     desc: "标准化 CSV：列重命名、类型推断、缺失值处理" },
      { id: "notion", name: "notion-formatter",desc: "把 markdown 转成 Notion block 树" },
      { id: "pdf",    name: "pdf-table-rip",   desc: "PDF 表格抽取（Camelot 风格）" },
    ];
    const state = {
      step: 0,
      name: "",
      accent: "claude",
      provider: null,
      apiKey: "",
      skills: new Set(),
    };

    const steps = [
      { key: "intro",    title: "欢迎",           desc: "了解一下" },
      { key: "account",  title: "创建账号",        desc: "本地账号，仅在你这台机器" },
      { key: "look",     title: "外观",           desc: "主题色 · 后续可改" },
      { key: "provider", title: "API Key",       desc: "至少一个可选 (可跳过)" },
      { key: "done",     title: "就绪",           desc: "进入应用" },
    ];

    // ───────── Rendering helpers ─────────
    const accentHex = () => (accentPalette.find(c => c.id === state.accent) || accentPalette[0]).hex;

    function applyAccent() {
      document.documentElement.style.setProperty("--accent", accentHex());
      const hex = accentHex();
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      document.documentElement.style.setProperty("--accent-soft", `rgba(${r},${g},${b},0.12)`);
      document.documentElement.style.setProperty("--accent-ring", `rgba(${r},${g},${b},0.25)`);
    }

    function render() {
      applyAccent();
      const stage = document.getElementById("stage");
      stage.innerHTML = `
        <aside class="rail">
          <div class="brand">
            <div class="mark"><svg viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#2C2C2C"/><use href="#forge-mark"/></svg></div>
            <div>
              <div class="brand-name">Forgify</div>
              <div class="brand-sub">v1.2</div>
            </div>
          </div>
          <div class="steps">
            ${steps.map((s, i) => `
              <div class="step ${i === state.step ? "is-active" : ""} ${i < state.step ? "is-done" : ""}">
                <div class="step-num">${i < state.step ? '<svg width="11" height="11"><use href="#i-check"/></svg>' : (i + 1)}</div>
                <div class="step-text">
                  <div class="step-title">${s.title}</div>
                  <div class="step-desc">${s.desc}</div>
                </div>
              </div>
            `).join("")}
          </div>
          <div class="rail-footer">
            所有数据存在 <code style="font-family:var(--font-mono)">~/.forgify/</code>。
            不上传任何服务器，不需要登录。
          </div>
        </aside>

        <div style="display:flex;flex-direction:column;min-height:0">
          <div class="content">${renderStep()}</div>
          <div class="actions">
            <div class="actions-progress">
              步骤 ${state.step + 1} / ${steps.length}
              <div class="progress-bar"><div style="width:${((state.step + 1) / steps.length * 100).toFixed(0)}%"></div></div>
            </div>
            ${state.step > 0 ? `<button class="btn btn-ghost" onclick="prev()"><svg><use href="#i-back"/></svg> 上一步</button>` : ""}
            ${state.step < steps.length - 1
              ? `<button class="btn btn-accent" onclick="next()" ${canAdvance() ? "" : "disabled"}>
                   ${state.step === 0 ? "开始" : "继续"}
                   <svg><use href="#i-arrow"/></svg>
                 </button>`
              : `<button class="btn btn-accent" onclick="finish()">进入应用 <svg><use href="#i-arrow"/></svg></button>`}
          </div>
        </div>
      `;
      // re-bind inputs after innerHTML
      const nameInput = document.getElementById("name-input");
      if (nameInput) {
        nameInput.value = state.name;
        nameInput.focus();
        nameInput.oninput = (e) => { state.name = e.target.value; render(); };
        nameInput.onkeydown = (e) => { if (e.key === "Enter" && canAdvance()) next(); };
      }
      const keyInput = document.getElementById("key-input");
      if (keyInput) {
        keyInput.value = state.apiKey;
        keyInput.oninput = (e) => { state.apiKey = e.target.value; render(); };
        keyInput.onkeydown = (e) => { if (e.key === "Enter" && state.provider) next(); };
      }
    }

    function renderStep() {
      const s = steps[state.step];
      if (s.key === "intro") {
        return `
          <div style="text-align:center; padding-top: 60px;">
            <div style="width:64px;height:64px;border-radius:14px;background:#2C2C2C;margin:0 auto 24px;display:grid;place-items:center;">
              <svg width="100%" height="100%" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#2C2C2C"/><use href="#forge-mark"/></svg>
            </div>
            <div class="content-title">欢迎使用 Forgify</div>
            <div class="content-sub" style="margin:14px auto 32px;">
              把 AI agent 当作日常的生产工具——<br/>
              在对话里造工具、组装工作流、跑起来。数据全部留在你这台电脑上。
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:560px;margin:0 auto;text-align:left;">
              ${[
                ["🛠️ 锻造", "在对话里造工具和工作流"],
                ["📊 执行", "本地调度，按时跑、按事件跑"],
                ["🔒 私有", "数据不离开你的设备"],
              ].map(([t, d]) => `
                <div style="padding:14px;border:1px solid var(--border-soft);border-radius:8px;background:var(--bg-elev-2);">
                  <div style="font-size:13px;font-weight:600;color:var(--ink);">${t}</div>
                  <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;line-height:1.5;">${d}</div>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }
      if (s.key === "account") {
        return `
          <div class="content-head">
            <div class="content-title">创建账号</div>
            <div class="content-sub">本地账号 · 只是个名字，不需要邮箱密码。同一台设备可以有多个账号（比如个人 / 工作）。</div>
          </div>
          <div class="content-body">
            <div class="avatar-row">
              <div class="avatar-preview" style="background:${accentHex()}">${(state.name || "?").slice(0,1).toUpperCase()}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600;color:var(--ink);">${state.name || "未命名"}</div>
                <div style="font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);">local · 仅你这台机器</div>
              </div>
            </div>
            <div class="field">
              <label class="field-label">名字</label>
              <input id="name-input" class="input lg" placeholder="例如：Sun · 或者你的英文名" autofocus />
              <div class="field-hint">回车继续</div>
            </div>
          </div>
        `;
      }
      if (s.key === "look") {
        return `
          <div class="content-head">
            <div class="content-title">挑个主题色</div>
            <div class="content-sub">设置面板里随时可改 · accent 会影响按钮 / 链接 / 状态徽章。</div>
          </div>
          <div class="content-body">
            <div class="field">
              <label class="field-label">Accent</label>
              <div class="color-swatches">
                ${accentPalette.map(c => `
                  <button class="swatch ${state.accent === c.id ? "is-active" : ""}" style="background:${c.hex}" title="${c.label}" onclick="setAccent('${c.id}')"></button>
                `).join("")}
              </div>
            </div>
            <div class="field">
              <label class="field-label">主题模式</label>
              <div class="seg">
                ${["system","light","dark"].map(m => `<button class="seg-btn ${(state.theme || "system") === m ? "is-active" : ""}" onclick="setTheme('${m}')">${m === "system" ? "跟随系统" : m === "light" ? "明亮" : "深色"}</button>`).join("")}
              </div>
              <div class="field-hint">跟随系统会根据你 OS 的偏好切换</div>
            </div>

            <div style="margin-top:24px;padding:18px;border:1px solid var(--border-soft);border-radius:10px;background:var(--bg-elev-2);">
              <div style="font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:10px;">预览</div>
              <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <button class="btn btn-accent">主操作</button>
                <button class="btn">次操作</button>
                <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:11px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:500;">
                  <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);"></span>
                  streaming
                </span>
                <code style="font-family:var(--font-mono);font-size:12px;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:3px;">fn_aggregate_week</code>
              </div>
            </div>
          </div>
        `;
      }
      if (s.key === "provider") {
        return `
          <div class="content-head">
            <div class="content-title">添加 API Key</div>
            <div class="content-sub">至少一个能跑 chat。可以稍后在设置里再加。Key 用 AES-GCM 加密存在本地。</div>
          </div>
          <div class="content-body">
            <div class="field">
              <label class="field-label">Provider</label>
              <div class="provider-grid">
                ${providers.map(p => `
                  <button class="provider-card ${state.provider === p.id ? "is-active" : ""}" onclick="setProvider('${p.id}')">
                    <div class="pchip" style="background:${p.bg}">${p.abbr}</div>
                    <div style="flex:1;min-width:0;">
                      <div class="pname">${p.name}</div>
                      <div class="pdesc">${p.id === "ollama" ? "无需 key" : "需要 key"}</div>
                    </div>
                  </button>
                `).join("")}
              </div>
            </div>
            ${state.provider && state.provider !== "ollama" ? `
              <div class="field">
                <label class="field-label">API Key</label>
                <input id="key-input" class="input" placeholder="sk-..." type="password" />
                <div class="field-hint">回车继续 · 不验证，仅本地保存</div>
              </div>
            ` : ""}
            ${state.provider === "ollama" ? `
              <div style="padding:14px;border-radius:6px;background:var(--accent-soft);font-size:12px;color:var(--ink-soft);line-height:1.55;">
                Ollama 是本地推理，无需 API key。确保 <code style="font-family:var(--font-mono)">ollama serve</code> 已启动。
              </div>
            ` : ""}
            <div style="margin-top:24px;font-size:12px;">
              <button class="btn btn-ghost" onclick="skipProvider()" style="padding:6px 10px;">跳过 · 稍后在设置里添加 →</button>
            </div>
          </div>
        `;
      }
      if (s.key === "skills") {
        return `
          <div class="content-head">
            <div class="content-title">勾几个 Skill</div>
            <div class="content-sub">Skill 是可复用的能力模板（SKILL.md 格式）。agent 在对话里会按需自动调用。</div>
          </div>
          <div class="content-body">
            <div class="field">
              <label class="field-label">推荐</label>
              <div style="display:flex;flex-direction:column;gap:2px;">
                ${skills.map(s => `
                  <button class="skill-row" onclick="toggleSkill('${s.id}')" style="background:transparent;border:0;cursor:pointer;width:100%;text-align:left;">
                    <div class="skill-check ${state.skills.has(s.id) ? "is-on" : ""}">
                      ${state.skills.has(s.id) ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><use href="#i-check"/></svg>' : ""}
                    </div>
                    <div style="flex:1;min-width:0;">
                      <div class="skill-name">${s.name}</div>
                      <div class="skill-desc">${s.desc}</div>
                    </div>
                  </button>
                `).join("")}
              </div>
              <div class="field-hint">可以一个都不选 · 之后从资源库添加</div>
            </div>
          </div>
        `;
      }
      if (s.key === "done") {
        return `
          <div class="done-stage">
            <div class="done-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
            <div class="done-title">就绪</div>
            <div class="done-sub">你的 Forgify 已经准备好了。</div>
            <div class="done-card-list">
              <div class="done-card">
                <div class="done-card-label">账号</div>
                <div class="done-card-value">${state.name || "未命名"}</div>
              </div>
              <div class="done-card">
                <div class="done-card-label">数据目录</div>
                <div class="done-card-value">~/.forgify/</div>
              </div>
              <div class="done-card">
                <div class="done-card-label">Provider</div>
                <div class="done-card-value">${state.provider || "稍后添加"}</div>
              </div>
              <div class="done-card">
                <div class="done-card-label">主题</div>
                <div class="done-card-value">${accentPalette.find(c => c.id === state.accent)?.label || "Claude 橙"}</div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--ink-faint);margin-top:28px;">
              小提示：用 <kbd>⌘</kbd> + <kbd>K</kbd> 打开命令面板
            </div>
          </div>
        `;
      }
      return "";
    }

    function canAdvance() {
      const s = steps[state.step];
      if (s.key === "account") return state.name.trim().length > 0;
      if (s.key === "provider") {
        if (!state.provider) return false;
        if (state.provider === "ollama") return true;
        return state.apiKey.trim().length > 0;
      }
      return true;
    }

    // ───────── Actions ─────────
    function next() {
      if (state.step < steps.length - 1 && canAdvance()) {
        state.step++;
        render();
      }
    }
    function prev() {
      if (state.step > 0) { state.step--; render(); }
    }
    function setAccent(id) { state.accent = id; render(); }
    function setTheme(t)   { state.theme = t;
      const root = document.documentElement;
      const resolved = t === "system"
        ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : t;
      root.dataset.theme = resolved;
      render();
    }
    function setProvider(id) { state.provider = id; render(); }
    function skipProvider() { state.provider = null; state.apiKey = ""; state.step++; render(); }
    function toggleSkill(id) {
      if (state.skills.has(id)) state.skills.delete(id); else state.skills.add(id);
      render();
    }
    function finish() {
      // In a real app: persist to localStorage / call backend / navigate to main app.
      alert("欢迎，" + (state.name || "你") + "！\n准备进入主应用…\n\n" + JSON.stringify({
        name: state.name,
        accent: state.accent,
        provider: state.provider,
        skills: [...state.skills],
      }, null, 2));
    }

    window.next = next;
    window.prev = prev;
    window.setAccent = setAccent;
    window.setTheme = setTheme;
    window.setProvider = setProvider;
    window.skipProvider = skipProvider;
    window.toggleSkill = toggleSkill;
    window.finish = finish;

    // ───────── Keyboard ─────────
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") return;
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "ArrowRight" && canAdvance()) next();
      if (e.key === "ArrowLeft") prev();
    });

    render();
  </script>
</body>
</html>
