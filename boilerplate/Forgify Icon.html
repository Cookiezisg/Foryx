<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Forgify — Icon · 双色 · spark 再放大</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap");
    :root {
      --paper:#FAFAF7; --ink:#37352F;
      --ink-soft:rgba(55,53,47,.55); --ink-faint:rgba(55,53,47,.4);
      --border:rgba(55,53,47,.10);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Inter","Noto Sans SC",sans-serif;background:var(--paper);color:var(--ink);padding:48px 56px 80px 56px;max-width:1100px;margin:0 auto;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
    h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:0 0 8px 0}
    .lead{color:var(--ink-soft);font-size:14px;line-height:1.55;margin:0 0 40px 0;max-width:720px}
    .section-label{font-size:11px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin:32px 0 14px 0;display:flex;align-items:center;gap:8px}
    .section-label::after{content:"";flex:1;height:1px;background:var(--border)}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .card{background:white;border:1px solid var(--border);border-radius:12px;padding:32px 28px 22px 28px;display:flex;flex-direction:column;align-items:center;gap:18px}
    .big{width:220px;height:220px;border-radius:48px;box-shadow:0 1px 2px rgba(0,0,0,.10),0 22px 40px -14px rgba(0,0,0,.30)}
    .mini-row{display:flex;align-items:center;gap:14px}
    .mini-row svg{box-shadow:0 1px 2px rgba(0,0,0,.10)}
    .m64{width:64px;height:64px;border-radius:14px}
    .m32{width:32px;height:32px;border-radius:7px}
    .m22{width:22px;height:22px;border-radius:5px}
    .m16{width:16px;height:16px;border-radius:3.5px}
    .name{font-size:14px;font-weight:600;color:var(--ink);text-align:center}
    .hex{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.04em;margin-top:4px;text-align:center}
  </style>
</head>
<body>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- spark r=224, inner offset 56. Center (512, 472). -->
      <symbol id="spark" viewBox="0 0 1024 1024">
        <path d="M 512 248 L 568 416 L 736 472 L 568 528 L 512 696 L 456 528 L 288 472 L 456 416 Z" fill="#E08862"/>
      </symbol>
      <!-- anvil pushed to y=736 to keep ~40px gap below the bigger spark -->
      <symbol id="anvil" viewBox="0 0 1024 1024">
        <rect x="232" y="736" width="560" height="76" rx="14" fill="currentColor"/>
      </symbol>
    </defs>
  </svg>

  <h1>Dark / Light · spark r=224</h1>
  <p class="lead">
    spark 半径从 200 → <b>224</b>（再 +12%），内凹点 56。砧面下移到 y=736，h=76，保留 ~40px 净空。spark 始终是 <code style="font-family:monospace;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px">#E08862</code>。
  </p>

  <div class="section-label"><span>双色 · 跟随系统</span></div>

  <div class="grid">

    <div class="card">
      <svg class="big" viewBox="0 0 1024 1024">
        <rect width="1024" height="1024" rx="224" fill="#2C2C2C"/>
        <use href="#spark"/>
        <g color="white"><use href="#anvil"/></g>
      </svg>
      <div class="mini-row">
        <svg class="m64" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#2C2C2C"/><use href="#spark"/><g color="white"><use href="#anvil"/></g></svg>
        <svg class="m32" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#2C2C2C"/><use href="#spark"/><g color="white"><use href="#anvil"/></g></svg>
        <svg class="m22" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#2C2C2C"/><use href="#spark"/><g color="white"><use href="#anvil"/></g></svg>
        <svg class="m16" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#2C2C2C"/><use href="#spark"/><g color="white"><use href="#anvil"/></g></svg>
      </div>
      <div>
        <div class="name">Dark</div>
        <div class="hex">#2C2C2C · #FFFFFF · #E08862</div>
      </div>
    </div>

    <div class="card">
      <svg class="big" viewBox="0 0 1024 1024">
        <rect width="1024" height="1024" rx="224" fill="#F5F5F2"/>
        <use href="#spark"/>
        <g color="#1F1F1F"><use href="#anvil"/></g>
      </svg>
      <div class="mini-row">
        <svg class="m64" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#F5F5F2"/><use href="#spark"/><g color="#1F1F1F"><use href="#anvil"/></g></svg>
        <svg class="m32" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#F5F5F2"/><use href="#spark"/><g color="#1F1F1F"><use href="#anvil"/></g></svg>
        <svg class="m22" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#F5F5F2"/><use href="#spark"/><g color="#1F1F1F"><use href="#anvil"/></g></svg>
        <svg class="m16" viewBox="0 0 1024 1024"><rect width="1024" height="1024" rx="224" fill="#F5F5F2"/><use href="#spark"/><g color="#1F1F1F"><use href="#anvil"/></g></svg>
      </div>
      <div>
        <div class="name">Light</div>
        <div class="hex">#F5F5F2 · #1F1F1F · #E08862</div>
      </div>
    </div>

  </div>

</body>
</html>
